name: uellow_driver
description: Uellow Driver — mobile companion to the carrier portal
publish_to: 'none'
version: 1.1.3+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  share_plus: ^10.0.2
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  signature: ^5.5.0
  qr_flutter: ^4.1.0
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
